name: bilibilimusic
description: "使用B站API获取音乐数据，并播放音乐"
version: 1.0.8+8
publish_to: none
environment:
  sdk: '>=3.4.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.5.0+1
  dio_smart_retry: ^7.0.1
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  flutter_color: ^2.1.0
  flutter_staggered_grid_view: ^0.7.0
  get: ^5.0.0-release-candidate-9.3.2
  qr_flutter: ^4.1.0
  path: ^1.8.3
  file: ^7.0.0
  intl: ^0.20.2 
  path_provider: ^2.1.1
  file_picker: ^10.3.3
  permission_handler: ^12.0.1
  flutter_cache_manager: ^3.3.1
  cached_network_image: ^3.3.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
    # 视频播放
  media_kit:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit
  media_kit_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/universal/media_kit_libs_video
  flex_color_picker: ^3.3.0
  share_handler: ^0.0.19
  flutter_smart_dialog: ^5.1.0 #各种弹窗 Toast/Dialog/Popup
  easy_refresh: ^3.4.0
  flutter_inappwebview: ^6.2.0-beta.3
  http: ^1.2.1
  marquee_list: ^1.0.0
  crypto: ^3.0.3
  screen_brightness: ^2.0.0+2
  flutter_volume_controller: ^1.2.7
  audio_video_progress_bar: ^2.0.3
  date_format: ^2.0.7
  wakelock_plus: ^1.1.3
  battery_plus: ^7.0.0
  stop_watch_timer: ^3.0.2
  flutter_exit_app: ^2.1.1
  url_launcher: ^6.1.12
  collection: ^1.18.0
  audio_service: ^0.18.18
  window_manager: ^0.5.1
  windows_single_instance: ^1.0.1
  font_awesome_flutter: ^11.0.0
  uuid: ^4.4.2
  ripple_wave: ^0.1.5
  server_nano_nano: 1.0.2
  network_info_plus: ^7.0.0
  flutter_multi_select_items: ^0.4.3
  flutter_foreground_task: ^9.2.0
  hive_ce: ^2.15.1
  hive_ce_flutter: ^2.3.3
  ffi: ^2.1.4
  package_info_plus: ^8.3.1
  launch_at_startup: ^0.5.1
  tray_manager: ^0.5.2
  flutter_single_instance: ^1.7.0
  flutter_acrylic: ^1.1.4
  bitsdojo_window: ^0.1.6
  win32: ^5.15.0
  auto_orientation_v2: ^2.3.6
  screen_retriever:
    git:
      url: https://github.com/MSOB7YY/screen_retriever.git
      path: ./packages/screen_retriever
      ref: main
dependency_overrides:
  screen_retriever:
     git:
      url: https://github.com/MSOB7YY/screen_retriever.git
      path: ./packages/screen_retriever
      ref: main
  media_kit:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit
  media_kit_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/universal/media_kit_libs_video
  # 仅保留 Windows/macOS/Android 三个平台的专属依赖
  media_kit_libs_android_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/android/media_kit_libs_android_video
  media_kit_libs_windows_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/windows/media_kit_libs_windows_video
  media_kit_libs_macos_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: main
      path: ./libs/macos/media_kit_libs_macos_video
dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: any
  json_serializable: ^6.7.1
  build_runner: ^2.3.3
  protoc_builder: ^0.4.1
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.12
  intl_utils: ^2.8.11
  flutter_lints: ^6.0.0
  dmg: ^0.1.7
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/bilibili_2.png"  # 图标路径
  adaptive_icon_background: "#FFFFFF"  # Android 适应性图标背景色
  windows:
    generate: true
    image_path: assets/images/bilibili_2.png
    icon_size: 48 # min:48, max:256, default: 48
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

